<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wallet Risk Report — Crypto Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #080b11;
    --panel:     #10151e;
    --panel-2:   #161d28;
    --line:      rgba(255,255,255,0.08);
    --line-2:    rgba(255,255,255,0.14);
    --txt:       #e7edf5;
    --txt-dim:   #8a98ab;
    --txt-faint: #5b6677;
    --high:      #ff4d57;
    --med:       #ffb020;
    --low:       #2fd47b;
    --info:      #4da3ff;
    --accent:    #5be0c8;
    --glow:      0 0 0 1px var(--line), 0 18px 50px -22px rgba(0,0,0,0.9);
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --sans: 'Outfit', system-ui, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(91,224,200,0.10), transparent 60%),
      radial-gradient(700px 500px at 0% 0%, rgba(77,163,255,0.08), transparent 55%),
      var(--bg);
    background-attachment: fixed;
    color: var(--txt);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    min-height: 100vh;
  }
  /* faint forensic grid */
  body::before {
    content: "";
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 46px 46px;
    mask-image: radial-gradient(circle at 50% 30%, black, transparent 80%);
    opacity: 0.35;
  }

  .wrap { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 40px 20px 80px; }

  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; letter-spacing: 0.4px; margin-bottom: 30px;
  }
  .brand .dot {
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 14px var(--accent);
  }
  .brand small { color: var(--txt-faint); font-family: var(--mono); font-weight: 500; font-size: 12px; }

  .card {
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: var(--glow);
    padding: 26px;
    animation: rise .5s cubic-bezier(.2,.7,.2,1) both;
  }
  .card + .card { margin-top: 18px; }

  /* ---- summary header ---- */
  .summary { display: grid; grid-template-columns: auto 1fr; gap: 24px; align-items: center; }
  @media (max-width: 520px){ .summary { grid-template-columns: 1fr; text-align: center; } }

  .gauge { position: relative; width: 132px; height: 132px; margin: 0 auto; }
  .gauge svg { transform: rotate(-90deg); }
  .gauge .ring-bg { stroke: rgba(255,255,255,0.07); }
  .gauge .ring-fg { stroke: var(--ring, var(--med)); stroke-linecap: round;
    transition: stroke-dashoffset 1s cubic-bezier(.2,.7,.2,1); filter: drop-shadow(0 0 8px var(--ring, var(--med))); }
  .gauge .center {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .gauge .score { font-family: var(--mono); font-size: 38px; font-weight: 700; line-height: 1; }
  .gauge .of100 { font-family: var(--mono); font-size: 11px; color: var(--txt-faint); margin-top: 3px; }

  .meta .addr {
    font-family: var(--mono); font-size: 14px; word-break: break-all;
    background: rgba(255,255,255,0.04); border: 1px solid var(--line);
    padding: 8px 11px; border-radius: 9px; display: inline-block; color: var(--txt);
  }
  .badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  @media (max-width:520px){ .badges { justify-content: center; } }
  .pill {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    padding: 5px 10px; border-radius: 999px; border: 1px solid var(--line-2);
    color: var(--txt-dim); text-transform: uppercase; letter-spacing: 0.5px;
  }
  .pill.risk { color: var(--ring, var(--med)); border-color: color-mix(in srgb, var(--ring, var(--med)) 50%, transparent); }

  /* ---- stats ---- */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
    background: var(--line); border-radius: 12px; overflow: hidden; }
  @media (max-width:520px){ .stats { grid-template-columns: repeat(2,1fr); } }
  .stat { background: var(--panel); padding: 16px; }
  .stat .k { font-family: var(--mono); font-size: 10.5px; color: var(--txt-faint);
    text-transform: uppercase; letter-spacing: 0.6px; }
  .stat .v { font-family: var(--mono); font-size: 18px; font-weight: 700; margin-top: 5px; }

  /* ---- findings ---- */
  .sec-title { font-size: 13px; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--txt-dim); margin: 4px 2px 14px; font-weight: 600; }

  .finding { display: grid; grid-template-columns: 6px 1fr; gap: 14px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 13px;
    padding: 16px 16px 16px 0; overflow: hidden; }
  .finding .bar { width: 4px; border-radius: 4px; margin-left: 10px; }
  .finding .ttl { display: flex; align-items: center; gap: 9px; font-weight: 600; font-size: 15px; }
  .finding .tag { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.6px;
    text-transform: uppercase; padding: 3px 8px; border-radius: 6px; }
  .finding .dsc { color: var(--txt-dim); font-size: 14px; margin-top: 7px; }
  .finding.info .bar { background: var(--info); }
  .finding.info .tag { color: var(--info); background: color-mix(in srgb, var(--info) 16%, transparent); }

  /* ---- locked paywall block ---- */
  .locked-card {
    position: relative; margin-top: 14px;
    border: 1px solid var(--line); border-radius: 16px; overflow: hidden;
    background: var(--panel);
  }
  .locked-rows { padding: 14px; display: grid; gap: 10px;
    filter: blur(7px); transform: scale(1.01); user-select: none; pointer-events: none;
    -webkit-mask-image: linear-gradient(180deg, #000 0%, #000 55%, transparent 100%);
            mask-image: linear-gradient(180deg, #000 0%, #000 55%, transparent 100%); }

  .lrow { display: grid; grid-template-columns: 4px 1fr auto; gap: 12px; align-items: center;
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 11px; padding: 13px 14px; }
  .lrow .lbar { width: 4px; height: 100%; min-height: 30px; border-radius: 4px; }
  .lrow .lttl { font-weight: 600; font-size: 14px; }
  .lrow .lsub { font-family: var(--mono); font-size: 11px; color: var(--txt-dim); margin-top: 4px; }
  .lrow .lsev { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: .6px;
    padding: 3px 9px; border-radius: 6px; text-transform: uppercase; }
  .lrow--high .lbar { background: var(--high); }
  .lrow--high .lsev { color: var(--high); background: color-mix(in srgb, var(--high) 18%, transparent); }
  .lrow--med  .lbar { background: var(--med); }
  .lrow--med  .lsev { color: var(--med);  background: color-mix(in srgb, var(--med) 18%, transparent); }
  .lrow--low  .lbar { background: var(--low); }
  .lrow--low  .lsev { color: var(--low);  background: color-mix(in srgb, var(--low) 18%, transparent); }

  .locked-badge {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 3; display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: .4px;
    background: rgba(8,11,17,0.85); backdrop-filter: blur(4px);
    border: 1px solid var(--line-2); color: var(--txt);
    padding: 9px 15px; border-radius: 999px; box-shadow: 0 8px 24px -10px #000;
  }

  .locked-bar {
    position: relative; z-index: 3; padding: 20px;
    display: flex; flex-direction: column; gap: 14px; align-items: center; text-align: center;
    background: linear-gradient(180deg, transparent, rgba(91,224,200,0.06));
    border-top: 1px solid var(--line);
  }
  .locked-bar__text { font-size: 13.5px; color: var(--txt-dim); max-width: 440px; }
  .locked-bar__btn {
    font-family: var(--sans); font-weight: 700; font-size: 15px; letter-spacing: .2px;
    color: #062018; cursor: pointer; border: 0; border-radius: 12px; padding: 14px 26px;
    background: linear-gradient(180deg, #6ff0d6, var(--accent));
    box-shadow: 0 12px 30px -12px var(--accent), inset 0 1px 0 rgba(255,255,255,.4);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .locked-bar__btn:hover { transform: translateY(-1px); box-shadow: 0 16px 36px -12px var(--accent), inset 0 1px 0 rgba(255,255,255,.5); }
  .locked-bar__btn:active { transform: translateY(0); }
  .locked-bar__btn:disabled { opacity: .6; cursor: progress; }
  .locked-bar__note { font-family: var(--mono); font-size: 11px; color: var(--txt-faint); }

  .state { text-align: center; color: var(--txt-dim); padding: 40px 0; font-family: var(--mono); font-size: 14px; }
  .state a { color: var(--accent); }
  .err { color: var(--high); }

  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  .d1 { animation-delay: .05s; } .d2 { animation-delay: .12s; } .d3 { animation-delay: .19s; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <span class="dot"></span> Crypto Scanner <small>/ wallet risk report</small>
    </div>

    <div id="root">
      <div class="state" id="loading">Analyzing wallet…</div>
    </div>
  </div>

<script>
  // Endpoints — adjust here if your Netlify routing differs.
  var REPORT_ENDPOINT = '/.netlify/functions/report';
  var PURCHASE_ENDPOINT = '/.netlify/functions/purchase';

  var params = new URLSearchParams(location.search);
  var ADDRESS = (params.get('address') || params.get('addr') || '').trim();
  var CHAIN = (params.get('chain') || '').trim();

  var root = document.getElementById('root');

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function fmtUsd(n) {
    n = Number(n) || 0;
    return '$' + n.toLocaleString('en-US', { maximumFractionDigits: n < 1000 ? 2 : 0 });
  }
  function fmtDate(ts) {
    if (!ts) return '—';
    var d = new Date(Number(ts));
    if (isNaN(d.getTime())) return '—';
    return d.toISOString().slice(0, 10);
  }
  function ringColor(level) {
    return level === 'High' ? 'var(--high)'
      : level === 'Elevated' ? 'var(--med)'
      : level === 'Moderate' ? 'var(--info)'
      : 'var(--low)';
  }

  function lockedRow(sev, mod) {
    return '' +
      '<div class="lrow lrow--' + mod + '">' +
        '<div class="lbar"></div>' +
        '<div>' +
          '<div class="lttl">████████ ███████ ██████</div>' +
          '<div class="lsub">0x████…████ · exposure ██%</div>' +
        '</div>' +
        '<div class="lsev">' + sev + '</div>' +
      '</div>';
  }

  function render(r) {
    var rc = ringColor(r.riskLevel);
    var C = 2 * Math.PI * 56; // r = 56
    var offset = C * (1 - (Number(r.score) || 0) / 100);
    var ls = r.lockedSummary || { total: 5, high: 1, medium: 1, low: 3 };

    var rows = '';
    for (var i = 0; i < (ls.high || 0); i++) rows += lockedRow('High', 'high');
    for (var j = 0; j < (ls.medium || 0); j++) rows += lockedRow('Medium', 'med');
    for (var k = 0; k < (ls.low || 0); k++) rows += lockedRow('Low', 'low');

    var price = (r.unlock && r.unlock.priceUsd) || 19.99;
    var label = (r.unlock && r.unlock.label) || 'Unlock Full Analysis';

    root.innerHTML = '' +
      // summary card
      '<div class="card d1" style="--ring:' + rc + '">' +
        '<div class="summary">' +
          '<div class="gauge">' +
            '<svg width="132" height="132" viewBox="0 0 132 132">' +
              '<circle class="ring-bg" cx="66" cy="66" r="56" fill="none" stroke-width="11"/>' +
              '<circle class="ring-fg" cx="66" cy="66" r="56" fill="none" stroke-width="11" ' +
                'stroke-dasharray="' + C.toFixed(1) + '" stroke-dashoffset="' + C.toFixed(1) + '" id="ringFg"/>' +
            '</svg>' +
            '<div class="center"><div class="score">' + (Number(r.score) || 0) + '</div><div class="of100">RISK / 100</div></div>' +
          '</div>' +
          '<div class="meta">' +
            '<div class="addr">' + esc(r.address) + '</div>' +
            '<div class="badges">' +
              '<span class="pill risk">' + esc(r.riskLevel) + ' risk</span>' +
              '<span class="pill">' + esc(r.chain) + '</span>' +
              '<span class="pill">' + esc(r.tier) + '</span>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +

      // stats card
      '<div class="card d2">' +
        '<div class="stats">' +
          '<div class="stat"><div class="k">Transactions</div><div class="v">' + (Number(r.stats.txCount) || 0).toLocaleString() + '</div></div>' +
          '<div class="stat"><div class="k">Volume</div><div class="v">' + fmtUsd(r.stats.volumeUsd) + '</div></div>' +
          '<div class="stat"><div class="k">Balance</div><div class="v">' + fmtUsd(r.stats.balanceUsd) + '</div></div>' +
          '<div class="stat"><div class="k">Last active</div><div class="v">' + fmtDate(r.stats.lastSeen) + '</div></div>' +
        '</div>' +
      '</div>' +

      // findings card
      '<div class="card d3">' +
        '<div class="sec-title">Findings</div>' +

        // free finding (open)
        '<div class="finding info">' +
          '<div class="bar"></div>' +
          '<div>' +
            '<div class="ttl"><span class="tag">Info</span>' + esc(r.freeFinding.title) + '</div>' +
            '<div class="dsc">' + esc(r.freeFinding.detail) + '</div>' +
          '</div>' +
        '</div>' +

        // locked paywall block
        '<div class="locked-card">' +
          '<div class="locked-badge">🔒 ' + (ls.total || 5) + ' more findings</div>' +
          '<div class="locked-rows">' + rows + '</div>' +
          '<div class="locked-bar">' +
            '<div class="locked-bar__text">Full report includes counterparty sanctions screening, exposure mapping and flagged-entity matches.</div>' +
            '<button class="locked-bar__btn" id="unlockBtn">' + esc(label) + ' — $' + Number(price).toFixed(2) + '</button>' +
            '<div class="locked-bar__note">Secure crypto payment · instant access</div>' +
          '</div>' +
        '</div>' +
      '</div>';

    // animate the ring
    requestAnimationFrame(function () {
      var fg = document.getElementById('ringFg');
      if (fg) fg.setAttribute('stroke-dashoffset', offset.toFixed(1));
    });

    document.getElementById('unlockBtn').addEventListener('click', unlock);
  }

  function unlock(e) {
    var btn = e.currentTarget;
    btn.disabled = true;
    var original = btn.textContent;
    btn.textContent = 'Creating invoice…';

    fetch(PURCHASE_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ address: ADDRESS, chain: CHAIN, plan: 'single' })
    })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (data && data.invoice_url) {
          window.location.href = data.invoice_url;
        } else {
          throw new Error((data && data.error) || 'No invoice returned');
        }
      })
      .catch(function () {
        btn.disabled = false;
        btn.textContent = original;
        var note = document.querySelector('.locked-bar__note');
        if (note) { note.textContent = 'Could not start checkout — please try again.'; note.classList.add('err'); }
      });
  }

  function showState(html) { root.innerHTML = '<div class="state">' + html + '</div>'; }

  // ---- boot ----
  if (!ADDRESS) {
    showState('No wallet address provided. <a href="/">Run a scan →</a>');
  } else {
    var url = REPORT_ENDPOINT + '?address=' + encodeURIComponent(ADDRESS) + (CHAIN ? '&chain=' + encodeURIComponent(CHAIN) : '');
    fetch(url)
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (data && data.ok) render(data);
        else showState('<span class="err">' + esc((data && data.error) || 'Could not analyze this address.') + '</span><br><br><a href="/">Try another →</a>');
      })
      .catch(function () {
        showState('<span class="err">Network error while fetching the report.</span><br><br><a href="/">Try again →</a>');
      });
  }
</script>
</body>
</html>
